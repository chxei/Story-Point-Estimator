<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Point Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header style="position: relative;">
            <h1>Story Point Estimator</h1>
            <p class="subtitle">Calculate complexity based on technical and procedural vectors.</p>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </header>

        <form id="estimator-form">
            <section class="card base-difficulty">
                <h2>Base Difficulty</h2>
                
                <div class="input-group">
                    <label>Technical Difficulty <span class="helper-text">— Core technical complexity of the task.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="tech-easy" name="tech-diff" value="2" checked>
                        <label for="tech-easy">Easy</label>
                        
                        <input type="radio" id="tech-medium" name="tech-diff" value="5">
                        <label for="tech-medium">Medium</label>
                        
                        <input type="radio" id="tech-hard" name="tech-diff" value="10">
                        <label for="tech-hard">Hard</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Procedural Difficulty <span class="helper-text">— Organizational and procedural complexity.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="proc-easy" name="proc-diff" value="2" checked>
                        <label for="proc-easy">Easy</label>
                        
                        <input type="radio" id="proc-medium" name="proc-diff" value="5">
                        <label for="proc-medium">Medium</label>
                        
                        <input type="radio" id="proc-hard" name="proc-diff" value="10">
                        <label for="proc-hard">Hard</label>
                    </div>
                </div>
            </section>

            <section class="card variables">
                <h2>Variables that Increase Difficulty</h2>
                
                <div class="input-group">
                    <label>Deployment Complexity <span class="helper-text">— Adds to overall difficulty.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="dep-easy" name="needs-deployment" value="0" checked>
                        <label for="dep-easy">Easy</label>
                        
                        <input type="radio" id="dep-medium" name="needs-deployment" value="1">
                        <label for="dep-medium">Medium</label>
                        
                        <input type="radio" id="dep-hard" name="needs-deployment" value="2">
                        <label for="dep-hard">Hard</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Testing Requirements <span class="helper-text">— Multiplies technical difficulty.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="test-easy" name="needs-tests" value="1.0" checked>
                        <label for="test-easy">Easy</label>
                        
                        <input type="radio" id="test-medium" name="needs-tests" value="1.15">
                        <label for="test-medium">Medium</label>
                        
                        <input type="radio" id="test-hard" name="needs-tests" value="1.30">
                        <label for="test-hard">Hard</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Module Dependencies <span class="helper-text">— Multiplies base difficulty.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="mod-easy" name="dependent-modules" value="1.0" checked>
                        <label for="mod-easy">Easy</label>
                        
                        <input type="radio" id="mod-medium" name="dependent-modules" value="1.15">
                        <label for="mod-medium">Medium</label>
                        
                        <input type="radio" id="mod-hard" name="dependent-modules" value="1.30">
                        <label for="mod-hard">Hard</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Technical Domain Knowledge <span class="helper-text">— Multiplies technical difficulty.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="techdom-easy" name="multiple-tech" value="1.0" checked>
                        <label for="techdom-easy">Easy</label>
                        
                        <input type="radio" id="techdom-medium" name="multiple-tech" value="1.30">
                        <label for="techdom-medium">Medium</label>
                        
                        <input type="radio" id="techdom-hard" name="multiple-tech" value="1.60">
                        <label for="techdom-hard">Hard</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Business Domain Knowledge <span class="helper-text">— Multiplies procedural difficulty.</span></label>
                    <div class="segmented-control">
                        <input type="radio" id="busdom-easy" name="multiple-bus" value="1.0" checked>
                        <label for="busdom-easy">Easy</label>
                        
                        <input type="radio" id="busdom-medium" name="multiple-bus" value="1.50">
                        <label for="busdom-medium">Medium</label>
                        
                        <input type="radio" id="busdom-hard" name="multiple-bus" value="2.0">
                        <label for="busdom-hard">Hard</label>
                    </div>
                </div>
            </section>
        </form>

        <div class="result-container">
            <h2>Estimated Story Points</h2>
            <div class="points-wrapper">
                <span id="result-points" class="points-value">1</span>
            </div>
        </div>
    </main>

    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
